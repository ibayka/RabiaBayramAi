<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8294a"/>
      <stop offset="100%" style="stop-color:#9b1a2e"/>
    </linearGradient>
    <linearGradient id="heart-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b87"/>
      <stop offset="100%" style="stop-color:#e8294a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

  <!-- R letter -->
  <text
    x="96"
    y="330"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="240"
    fill="white"
    letter-spacing="-8"
  >R</text>

  <!-- Heart symbol (centre-top area) -->
  <g transform="translate(256,210) scale(1.15)">
    <path d="
      M0,15
      C0,-10 -30,-35 -55,-20
      C-80,-5 -80,30 -55,55
      L0,105
      L55,55
      C80,30 80,-5 55,-20
      C30,-35 0,-10 0,15
      Z
    " fill="url(#heart-g)" opacity="0.95"/>
    <!-- Heart highlight -->
    <path d="M-28,-18 C-40,-22 -52,-14 -54,-2" stroke="rgba(255,255,255,0.35)" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- B letter -->
  <text
    x="300"
    y="330"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="240"
    fill="white"
    letter-spacing="-8"
  >B</text>
</svg>
